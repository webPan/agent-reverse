<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Protocol Viewer</title>
    <link rel="stylesheet" href="./assets/protocol-viewer.css" />
  </head>
  <body>
    <div class="app-shell">
      <header id="topbar" class="topbar">
        <div class="brand">
          <h1>Agent Protocol Viewer</h1>
          <p>本地对话协议解剖工具：消息、工具、MCP、skill、agent 关系一屏看清。</p>
        </div>
        <div class="controls">
          <label class="field">
            <span>内置样本</span>
            <select id="sampleSelect"></select>
          </label>
          <button id="viewRootJson" class="ghost-button" type="button">原始JSON</button>
          <label class="file-button">
            <input id="fileInput" type="file" accept=".json,application/json" />
            选择 JSON
          </label>
        </div>
      </header>

      <main id="workspace" class="workspace">
        <section class="timeline-panel">
          <div class="section-head">
            <div>
              <h2>事件时间线</h2>
              <p id="timelineHint">按协议顺序展开消息、工具调用和上下文注入。</p>
            </div>
            <button id="copySelectedPath" class="ghost-button" type="button">复制 JSONPath</button>
          </div>
          <div id="timeline" class="timeline"></div>
        </section>

        <aside class="detail-panel">
          <div class="tabs">
            <button class="tab active" data-tab="text" type="button">文本</button>
            <button class="tab" data-tab="raw" type="button">Raw JSON</button>
            <button class="tab" data-tab="config" type="button">请求配置</button>
            <button class="tab" data-tab="stats" type="button">统计</button>
          </div>
          <div id="detail" class="detail-content"></div>
        </aside>
      </main>

      <main id="rootJsonView" class="root-json-view hidden">
        <section class="root-json-panel">
          <pre id="rootJsonContent"></pre>
        </section>
      </main>
    </div>

    <script src="./vendor/marked.min.js"></script>
    <script src="./assets/protocol-viewer.js"></script>
  </body>
</html>
