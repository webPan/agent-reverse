<body class="min-h-screen text-ink">
	<div x-data="viewerApp()" x-init="init()" class="mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 py-8 sm:px-6 lg:px-8">
		<header class="rise-in mb-8 overflow-hidden rounded-[2rem] border border-white/60 glass shadow-panel">
			<div class="grid gap-6 px-6 py-8 lg:grid-cols-[1.3fr_0.7fr] lg:px-8">
				<div>
					<p class="mb-3 inline-flex rounded-full bg-white/70 px-3 py-1 text-xs font-semibold uppercase tracking-[0.28em] text-slate">Alpine.js JSON Workspace</p>
					<h1 class="max-w-3xl text-3xl font-bold leading-tight sm:text-4xl">Copilot Agent Chat Json</h1>
					<p class="mt-4 max-w-2xl text-sm leading-7 text-slate-700 sm:text-base">
						页面启动后会默认抓取中文会话 JSON，支持在中英文之间快速切换，也支持手动选择任意本地 JSON 文件进行加载和解析。
					</p>
				</div>
				<div class="rounded-[1.6rem] bg-ink px-5 py-5 text-sand">
					<div class="status-panel">
						<div class="status-panel-top flex items-center justify-center">
							<div class="lang-toggle-group">
								<button
									type="button"
									class="lang-toggle-button text-xs font-semibold transition focus:outline-none"
									:class="language === 'zh' ? 'is-active' : 'is-idle'"
									@click="switchLanguage('zh')"
								>
									中文
								</button>
								<button
									type="button"
									class="lang-toggle-button text-xs font-semibold transition focus:outline-none"
									:class="language === 'en' ? 'is-active' : 'is-idle'"
									@click="switchLanguage('en')"
								>
									English
								</button>
							</div>
						</div>
						<div class="status-panel-bottom">
							<div>
								<p class="status-filename text-lg font-semibold" x-text="datasetLabel"></p>
							</div>
							<button
								type="button"
								class="file-trigger-button text-xs font-semibold transition focus:outline-none"
								@click="$refs.jsonPicker.click()"
							>
								选择 JSON
							</button>
							<input
								x-ref="jsonPicker"
								type="file"
								accept=".json,application/json"
								class="hidden"
								@change="handleFilePicked($event)"
							>
						</div>
					</div>
					<p class="mt-3 text-sm leading-7 text-sand/80" x-text="summaryText"></p>
				</div>
			</div>
		</header>

		<main class="grid flex-1 gap-6">
			<section class="rise-in grid min-w-0 gap-6">
				<div class="rounded-[2rem] border border-white/60 glass p-5 shadow-panel">
					<div x-show="loading" class="rounded-[1.5rem] border border-dashed border-slate-300/80 bg-white/40 p-5 text-sm leading-7 text-slate-700">
						正在加载 <span x-text="datasetLabel"></span> ...
					</div>
					<div x-show="errorMessage" class="rounded-[1.5rem] border border-dashed border-slate-300/80 bg-white/40 p-5 text-sm leading-7 text-slate-700" x-text="errorMessage"></div>
					<div class="space-y-4" x-show="!loading && !errorMessage && segments.length">
						<template x-for="(segment, index) in segments" :key="`${segment.role}-${index}`">
							<article class="overflow-hidden rounded-[1.5rem] border border-slate-200/80 bg-white/80">
								<div class="flex items-center justify-between gap-4 border-b border-slate-100 px-5 py-4">
									<div class="flex items-center gap-3">
										<span class="rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-[0.24em]" :class="rolePalette[segment.role] || rolePalette.unknown" x-text="segment.role"></span>
										<span class="text-sm text-slate-500" x-text="`片段 ${index + 1}`"></span>
									</div>
									<span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600" x-text="segment.isMarkdown ? 'Markdown' : 'Plain Text'"></span>
								</div>
								<div class="prose-view px-5 py-5 text-[15px] leading-7 text-slate-800" x-html="renderSegment(segment)"></div>
							</article>
						</template>
					</div>
				</div>
			</section>
		</main>
	</div>

	<script>
		const rolePalette = {
			system: "bg-slate-200 text-slate-700",
			user: "bg-amber-100 text-amber-800",
			assistant: "bg-emerald-100 text-emerald-800",
			tool: "bg-sky-100 text-sky-800",
			unknown: "bg-slate-100 text-slate-700"
		};

		function viewerApp() {
			return {
				language: "zh",
				sourceMode: "preset",
				segments: [],
				loading: false,
				errorMessage: "",
				summaryText: "准备加载中文会话 JSON。",
				emptyHint: "加载文件后，这里会显示可阅读内容。",
				datasetLabel: "session_zh.json",
				rolePalette,
				fileMap: {
					zh: "./vs-code-copilot/session_zh.json",
					en: "./vs-code-copilot/session_en.json"
				},
				init() {
					this.loadSession("zh");
				},
				switchLanguage(language) {
					if (this.loading || this.language === language) {
						return;
					}
					this.loadSession(language);
				},
				async handleFilePicked(event) {
					const [file] = event.target.files || [];
					if (!file || this.loading) {
						return;
					}

					await this.loadCustomSession(file);
					event.target.value = "";
				},
				async loadSession(language) {
					this.language = language;
					this.sourceMode = "preset";
					this.loading = true;
					this.errorMessage = "";
					this.segments = [];
					this.emptyHint = "正在读取 JSON 内容。";
					this.datasetLabel = language === "zh" ? "session_zh.json" : "session_en.json";

					try {
						const response = await fetch(this.fileMap[language], { cache: "no-store" });
						if (!response.ok) {
							throw new Error(`HTTP ${response.status}`);
						}

						const text = await response.text();
						this.applyParsedSession(JSON.parse(text), {
							datasetLabel: this.datasetLabel,
							successText: "包含对话文本和可识别的 tools 定义。",
							emptyText: "文件已加载，但未识别到可展示的文本或工具定义。"
						});
					} catch (error) {
						this.summaryText = "默认 fetch 加载失败，请通过静态服务器打开此页面。";
						this.emptyHint = "当前没有可渲染的内容。";
						this.errorMessage = `无法加载 ${this.datasetLabel}：${error.message}`;
					} finally {
						this.loading = false;
					}
				},
				async loadCustomSession(file) {
					this.language = "custom";
					this.sourceMode = "custom";
					this.loading = true;
					this.errorMessage = "";
					this.segments = [];
					this.emptyHint = "正在读取本地 JSON 文件。";
					this.datasetLabel = file.name;

					try {
						const text = await file.text();
						this.applyParsedSession(JSON.parse(text), {
							datasetLabel: file.name,
							successText: "来自你手动选择的本地 JSON 文件。",
							emptyText: "JSON 已加载，但未识别到可展示的文本或工具定义。"
						});
					} catch (error) {
						this.summaryText = "本地文件读取失败，请确认所选文件是有效 JSON。";
						this.emptyHint = "当前没有可渲染的内容。";
						this.errorMessage = `无法解析 ${file.name}：${error.message}`;
					} finally {
						this.loading = false;
					}
				},
				applyParsedSession(parsed, options) {
					this.datasetLabel = options.datasetLabel;
					this.segments = extractSegments(parsed);
					this.summaryText = this.segments.length
						? `已提取 ${this.segments.length} 段内容，${options.successText}`
						: options.emptyText;
					this.emptyHint = this.segments.length
						? "已按角色和文本结构整理内容。"
						: "未识别到可提取文本或工具定义。";
				},
				renderSegment(segment) {
					return segment.isMarkdown
						? renderMarkdown(segment.text)
						: `<p>${inlineMarkdown(escapeHtml(segment.text)).replace(/\n/g, "<br>")}</p>`;
				}
			};
		}

		function extractSegments(value) {
			const found = [];
			walk(value, { role: "unknown", parentKey: null }, found);

			const unique = [];
			const seen = new Set();

			for (const item of found) {
				const normalized = normalizeDisplayText(item.text).trim();
				if (!normalized) {
					continue;
				}

				const key = `${item.role}::${normalized}`;
				if (seen.has(key)) {
					continue;
				}

				seen.add(key);
				unique.push({
					role: item.role,
					text: normalized,
					isMarkdown: looksLikeMarkdown(normalized)
				});
			}

			return unique;
		}

		function walk(node, context, found) {
			if (node == null) {
				return;
			}

			if (typeof node === "string") {
				if (context.captureString && node.trim()) {
					found.push({ role: context.role || "unknown", text: node });
				}
				return;
			}

			if (Array.isArray(node)) {
				if (context.parentKey === "tools") {
					const toolSummary = buildToolSummary(node);
					if (toolSummary) {
						found.push({ role: "tool", text: toolSummary });
					}
					return;
				}

				node.forEach(item => walk(item, context, found));
				return;
			}

			if (typeof node !== "object") {
				return;
			}

			const nextRole = typeof node.role === "string"
				? node.role.toLowerCase()
				: context.role;

			if (typeof node.text === "string" && node.text.trim()) {
				found.push({ role: nextRole || "unknown", text: node.text });
			}

			if (typeof node.content === "string" && node.content.trim()) {
				found.push({ role: nextRole || "unknown", text: node.content });
			}

			if (typeof node.message === "string" && node.message.trim()) {
				found.push({ role: nextRole || "unknown", text: node.message });
			}

			if (typeof node.input === "string" && node.input.trim()) {
				found.push({ role: nextRole || "unknown", text: node.input });
			}

			if (typeof node.output_text === "string" && node.output_text.trim()) {
				found.push({ role: nextRole || "unknown", text: node.output_text });
			}

			Object.entries(node).forEach(([key, value]) => {
				const shouldCaptureString = key === "text" || key === "content" || key === "message" || key === "input" || key === "output_text";
				walk(value, { role: nextRole || "unknown", captureString: shouldCaptureString, parentKey: key }, found);
			});
		}

		function looksLikeMarkdown(text) {
			return /(^#|\n#|```|^[-*]\s|\n[-*]\s|^\d+\.\s|\n\d+\.\s|\[[^\]]+\]\([^)]+\)|\|.+\|)/m.test(text);
		}

		function renderMarkdown(text) {
			const normalized = normalizeDisplayText(text);
			const codeBlocks = [];
			const withCodeTokens = normalized.replace(/```([\s\S]*?)```/g, (_, code) => {
				const token = `__CODE_BLOCK_${codeBlocks.length}__`;
				codeBlocks.push(`<pre><code>${escapeHtml(code.trim())}</code></pre>`);
				return token;
			});

			const lines = withCodeTokens.split("\n");
			const htmlParts = [];
			let paragraphBuffer = [];
			let lineIndex = 0;

			function flushParagraph() {
				if (!paragraphBuffer.length) {
					return;
				}

				htmlParts.push(`<p>${paragraphBuffer.map(line => inlineMarkdown(escapeHtml(line))).join("<br>")}</p>`);
				paragraphBuffer = [];
			}

			while (lineIndex < lines.length) {
				const rawLine = lines[lineIndex];
				const line = rawLine.trim();

				if (!line) {
					flushParagraph();
					lineIndex += 1;
					continue;
				}

				if (/^__CODE_BLOCK_\d+__$/.test(line)) {
					flushParagraph();
					htmlParts.push(line);
					lineIndex += 1;
					continue;
				}

				if (/^###\s+/.test(line)) {
					flushParagraph();
					htmlParts.push(`<h3>${inlineMarkdown(escapeHtml(line.replace(/^###\s+/, "")))}</h3>`);
					lineIndex += 1;
					continue;
				}

				if (/^##\s+/.test(line)) {
					flushParagraph();
					htmlParts.push(`<h2>${inlineMarkdown(escapeHtml(line.replace(/^##\s+/, "")))}</h2>`);
					lineIndex += 1;
					continue;
				}

				if (/^#\s+/.test(line)) {
					flushParagraph();
					htmlParts.push(`<h1>${inlineMarkdown(escapeHtml(line.replace(/^#\s+/, "")))}</h1>`);
					lineIndex += 1;
					continue;
				}

				if (/^[-*]\s+/.test(line)) {
					flushParagraph();
					const items = [];
					while (lineIndex < lines.length && /^[-*]\s+/.test(lines[lineIndex].trim())) {
						items.push(`<li>${inlineMarkdown(escapeHtml(lines[lineIndex].trim().replace(/^[-*]\s+/, "")))}</li>`);
						lineIndex += 1;
					}
					htmlParts.push(`<ul>${items.join("")}</ul>`);
					continue;
				}

				if (/^\d+\.\s+/.test(line)) {
					flushParagraph();
					const items = [];
					while (lineIndex < lines.length && /^\d+\.\s+/.test(lines[lineIndex].trim())) {
						items.push(`<li>${inlineMarkdown(escapeHtml(lines[lineIndex].trim().replace(/^\d+\.\s+/, "")))}</li>`);
						lineIndex += 1;
					}
					htmlParts.push(`<ol>${items.join("")}</ol>`);
					continue;
				}

				if (/^>\s?/.test(line)) {
					flushParagraph();
					const quotes = [];
					while (lineIndex < lines.length && /^>\s?/.test(lines[lineIndex].trim())) {
						quotes.push(inlineMarkdown(escapeHtml(lines[lineIndex].trim().replace(/^>\s?/, ""))));
						lineIndex += 1;
					}
					htmlParts.push(`<blockquote>${quotes.join("<br>")}</blockquote>`);
					continue;
				}

				if (/^<[^>]+>$/.test(line)) {
					flushParagraph();
					htmlParts.push(`<p>${escapeHtml(line)}</p>`);
					lineIndex += 1;
					continue;
				}

				paragraphBuffer.push(rawLine);
				lineIndex += 1;
			}

			flushParagraph();

			return htmlParts
				.join("")
				.replace(/__CODE_BLOCK_(\d+)__/g, (_, index) => codeBlocks[Number(index)] || "");
		}

		function buildToolSummary(tools) {
			if (!Array.isArray(tools) || !tools.length) {
				return "";
			}

			const lines = ["## Tools", ""];

			tools.forEach(tool => {
				if (!tool || typeof tool !== "object") {
					return;
				}

				const definition = normalizeToolDefinition(tool);
				const params = definition.parameters && typeof definition.parameters === "object"
					? Object.keys(definition.parameters.properties || {})
					: [];
				lines.push(`### ${definition.name || "Unnamed Tool"}`);
				if (definition.description) {
					lines.push(definition.description);
				}
				if (definition.type && definition.type !== "function") {
					lines.push(`- 类型: ${definition.type}`);
				}
				if (params.length) {
					lines.push(`- 参数: ${params.join(", ")}`);
				}
				if (Array.isArray(definition.parameters?.required) && definition.parameters.required.length) {
					lines.push(`- 必填: ${definition.parameters.required.join(", ")}`);
				}
				lines.push("");
			});

			return lines.join("\n").trim();
		}

		function normalizeToolDefinition(tool) {
			const wrappedFunction = tool.function && typeof tool.function === "object"
				? tool.function
				: null;

			return {
				type: typeof tool.type === "string" ? tool.type : "",
				name: wrappedFunction?.name || tool.name || "",
				description: wrappedFunction?.description || tool.description || "",
				parameters: wrappedFunction?.parameters || tool.parameters || null
			};
		}

		function normalizeDisplayText(text) {
			return String(text)
				.replace(/\\r\\n/g, "\n")
				.replace(/\\n/g, "\n")
				.replace(/\r\n/g, "\n");
		}

		function inlineMarkdown(text) {
			return text
				.replace(/`([^`]+)`/g, "<code>$1</code>")
				.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
				.replace(/\*([^*]+)\*/g, "<em>$1</em>")
				.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer" class="text-slate-700 underline">$1</a>');
		}

		function escapeHtml(value) {
			return value
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;")
				.replace(/\"/g, "&quot;")
				.replace(/'/g, "&#39;");
		}
	</script>
</body>
